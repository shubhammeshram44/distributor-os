name: Daily Payment Reminder Sweep
on:
  schedule:
    - cron: '30 3 * * *'   # 3:30 UTC = 9:00 AM IST
  workflow_dispatch:        # lets you trigger it manually from the Actions tab too

jobs:
  trigger-sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Call reminder sweep endpoint
        run: |
          curl -X POST -f "https://distributor-os-backend.onrender.com/api/v1/payments/trigger-reminder-sweep"
